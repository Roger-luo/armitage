<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Roadmap</title>
  {% if inline_js %}
  <script>{{ echart_js|safe }}</script>
  {% else %}
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  {% endif %}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
    }
    #nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      height: 48px;
    }
    #breadcrumb {
      font-size: 14px;
      flex: 1;
    }
    .crumb {
      color: #58a6ff;
      cursor: pointer;
    }
    .crumb:hover { text-decoration: underline; }
    .crumb-sep { color: #484f58; margin: 0 2px; }
    .crumb-current { color: #e6edf3; }
    .range-toggle {
      display: flex;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
      font-size: 12px;
    }
    .range-toggle button {
      background: #21262d;
      color: #8b949e;
      border: none;
      padding: 4px 12px;
      cursor: pointer;
    }
    .range-toggle button:not(:last-child) {
      border-right: 1px solid #30363d;
    }
    .range-toggle button:hover { color: #e6edf3; }
    .range-toggle button.active {
      background: #30363d;
      color: #e6edf3;
    }
    #main {
      display: flex;
      height: calc(100vh - 48px);
    }
    #chart {
      flex: 1;
      min-width: 0;
    }
    #panel {
      width: 340px;
      background: #161b22;
      border-left: 1px solid #30363d;
      overflow-y: auto;
      padding: 16px;
      display: none;
      flex-shrink: 0;
    }
    #panel.open { display: block; }
    #panel-close {
      float: right;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    #panel-close:hover { color: #e6edf3; }
    #panel h2 {
      font-size: 16px;
      margin-bottom: 4px;
      padding-right: 24px;
    }
    #panel .panel-status {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    #panel .panel-status.active { background: #1e3a5f; color: #58a6ff; }
    #panel .panel-status.completed { background: #2d333b; color: #8b949e; }
    #panel .panel-status.paused { background: #3d2e00; color: #f59e0b; }
    #panel .panel-status.cancelled { background: #3d1418; color: #ef4444; }
    #panel .panel-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
    }
    #panel .panel-section h3 {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    #panel .panel-desc {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.5;
    }
    #panel .panel-meta {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.8;
    }
    #panel .panel-meta .label {
      color: #8b949e;
    }
    #panel .panel-children {
      list-style: none;
      font-size: 13px;
    }
    #panel .panel-children li {
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #panel .panel-children .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #panel .panel-children .child-name {
      color: #c9d1d9;
    }
    #panel .panel-children .child-dates {
      color: #484f58;
      font-size: 11px;
      margin-left: auto;
    }
    #panel .panel-milestones {
      list-style: none;
      font-size: 13px;
    }
    #panel .panel-milestones li {
      padding: 3px 0;
      color: #c9d1d9;
    }
    #panel .panel-milestones .ms-date {
      color: #8b949e;
      font-size: 11px;
    }
    .btn-drill {
      display: inline-block;
      margin-top: 12px;
      background: #21262d;
      color: #58a6ff;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-drill:hover { background: #30363d; }
    #panel .panel-issues {
      list-style: none;
      font-size: 13px;
    }
    #panel .panel-issues li {
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
    }
    #panel .panel-issues li:last-child {
      border-bottom: none;
    }
    .panel-issue-link {
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
      line-height: 1.4;
    }
    .panel-issue-link:hover { text-decoration: underline; }
    .panel-issue-link .issue-ref {
      color: #484f58;
      font-size: 11px;
    }
    .issue-date {
      color: #8b949e;
      font-size: 11px;
    }
    .issue-overflow {
      color: #ef4444;
      font-size: 11px;
      font-weight: bold;
    }
    .panel-overflow {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 8px 12px !important;
      margin-top: 12px !important;
    }
    .panel-overflow h3 {
      color: #ef4444 !important;
    }
  </style>
</head>
<body>
  <div id="nav">
    <div id="breadcrumb"></div>
    <div class="range-toggle">
      <button id="btn-fitted" class="active" onclick="window.__setRange(false)">Fitted</button>
      <button id="btn-global" onclick="window.__setRange(true)">Global</button>
    </div>
  </div>
  <div id="main">
    <div id="chart"></div>
    <div id="panel">
      <button id="panel-close" onclick="window.__closePanel()">&times;</button>
      <div id="panel-content"></div>
    </div>
  </div>

  <script>
    window.__CHART_DATA__ = {{ chart_data_json|safe }};
  </script>
  <script>
    {{ chart_js|safe }}
  </script>
</body>
</html>
