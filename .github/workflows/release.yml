name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. armitage-v0.1.2)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  build:
    if: startsWith(inputs.tag, 'armitage-v')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p armitage

      - name: Package
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#armitage-v}"
          cd target/${{ matrix.target }}/release
          tar czf ../../../armitage-${VERSION}-${{ matrix.target }}.tar.gz armitage
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: armitage-${{ matrix.target }}
          path: armitage-*.tar.gz

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: armitage-*.tar.gz
